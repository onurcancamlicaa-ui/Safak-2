<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zehrama Kavuşmaya Kalan Süre</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=General+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --white: #ffffff;
      --gray-dim: rgba(255,255,255,0.35);
      --gray-faint: rgba(255,255,255,0.12);
    }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      color: var(--white);
      font-family: 'General Sans', sans-serif;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0; opacity: 0.5;
    }
    .wrapper {
      position: relative; z-index: 1;
      text-align: center; padding: 2rem;
      animation: fadeUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .label-top {
      font-size: clamp(11px, 1.2vw, 13px);
      font-weight: 400; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--gray-dim);
      margin-bottom: 3.5rem;
    }
    .grid {
      display: flex; gap: clamp(1.5rem, 4vw, 4rem);
      justify-content: center; align-items: flex-end; flex-wrap: wrap;
    }
    .unit {
      display: flex; flex-direction: column; align-items: center; gap: 0.55rem;
      opacity: 0; animation: unitIn 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    .unit:nth-child(1) { animation-delay: 0.15s; }
    .unit:nth-child(2) { animation-delay: 0.25s; }
    .unit:nth-child(3) { animation-delay: 0.35s; }
    .unit:nth-child(4) { animation-delay: 0.45s; }
    @keyframes unitIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .number {
      font-size: clamp(64px, 12vw, 140px);
      font-weight: 300; letter-spacing: -0.04em; line-height: 1;
      font-variant-numeric: tabular-nums;
      transition: opacity 0.15s ease;
    }
    .number.tick { opacity: 0.6; }
    .unit-label {
      font-size: clamp(10px, 1vw, 12px); font-weight: 500;
      letter-spacing: 0.18em; text-transform: uppercase; color: var(--gray-dim);
    }
    .divider {
      font-size: clamp(40px, 8vw, 90px); font-weight: 200;
      color: var(--gray-faint); line-height: 1;
      padding-bottom: 0.35rem; align-self: flex-end;
    }
    .label-bottom {
      margin-top: 4rem;
      font-size: clamp(12px, 1.3vw, 14px); font-weight: 400;
      letter-spacing: 0.06em; color: var(--gray-dim); line-height: 1.7;
    }
    .label-bottom span { color: rgba(255,255,255,0.65); font-weight: 500; }

    /* PHOTO OVERLAY */
    #photo-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 100;
      background: #000;
      align-items: center; justify-content: center;
      flex-direction: column;
      animation: overlayIn 1.2s cubic-bezier(0.22,1,0.36,1) both;
    }
    #photo-overlay.show { display: flex; }
    @keyframes overlayIn {
      from { opacity: 0; } to { opacity: 1; }
    }
    #photo-overlay img {
      max-width: min(90vw, 680px);
      max-height: 75vh;
      border-radius: 18px;
      object-fit: cover;
      box-shadow: 0 40px 120px rgba(0,0,0,0.9);
      animation: photoUp 1.4s cubic-bezier(0.22,1,0.36,1) 0.3s both;
    }
    @keyframes photoUp {
      from { opacity: 0; transform: scale(0.88) translateY(30px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    #photo-overlay .reunion-text {
      margin-top: 2.5rem;
      font-size: clamp(18px, 3vw, 28px);
      font-weight: 300; letter-spacing: 0.05em;
      color: rgba(255,255,255,0.9);
      animation: photoUp 1.4s cubic-bezier(0.22,1,0.36,1) 0.55s both;
    }
    #photo-overlay .reunion-sub {
      margin-top: 0.7rem;
      font-size: clamp(11px, 1.2vw, 13px);
      letter-spacing: 0.18em; text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      animation: photoUp 1.4s cubic-bezier(0.22,1,0.36,1) 0.7s both;
    }
  </style>
</head>

    <div class="divider">·</div>

    <div class="divider">·</div>
    <div class="unit"><div class="number" id="seconds">--</div><div class="unit-label">Saniye</div></div>
  </div>
  <p class="label-bottom">

    <span>4 Temmuz 2026</span> — Askerlik başlıyor
  </p>
</div>

</div>

  function pad(n) { return String(n).padStart(2, '0'); }

  function tick(el, value) {
    el.classList.remove('tick');
    void el.offsetWidth;
    el.textContent = value;
    el.classList.add('tick');
    setTimeout(() => el.classList.remove('tick'), 150);
  }

  let prevSec = -1;
  let done = false;

  function update() {
    if (done) return;
    const diff = TARGET - new Date();

    if (diff <= 0) {
      done = true;
      overlay.classList.add('show');
      return;
    }

    const total   = Math.floor(diff / 1000);
    const days    = Math.floor(total / 86400);
    const hours   = Math.floor((total % 86400) / 3600);
    const minutes = Math.floor((total % 3600) / 60);
    const seconds = total % 60;

    if (seconds !== prevSec) {
      tick(daysEl,    pad(days));
      tick(hoursEl,   pad(hours));
      tick(minutesEl, pad(minutes));
      tick(secondsEl, pad(seconds));
      prevSec = seconds;
    }
  }

  update();
  setInterval(update, 500);
</script>
